<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Share 管理画面</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .admin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .admin-card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent); }
    .form-row { margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 0.3rem; }
    input[type=text], input[type=password] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
    }
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: 0.5rem;
    }
    .btn:hover { opacity: 0.85; }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* 一括アップロードエリア */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      color: var(--text-sub);
      transition: border-color 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); color: var(--text); }
    .drop-zone input { display: none; }

    /* アップロードキュー */
    .upload-queue { margin-top: 1.5rem; }
    .queue-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .queue-thumb {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--surface2);
    }
    .queue-info { flex: 1; }
    .queue-name { color: var(--text); font-size: 0.8rem; }
    .queue-fields { display: flex; gap: 0.5rem; margin-top: 0.3rem; }
    .queue-fields input {
      flex: 1;
      padding: 0.25rem 0.5rem;
      font-size: 0.78rem;
    }
    .side-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.25rem 0.4rem;
      font-size: 0.78rem;
    }
    .status-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .status-pending  { background: var(--surface2); color: var(--text-sub); }
    .status-uploading { background: #1a3a5c; color: var(--accent2); }
    .status-done     { background: #1a3a2a; color: #7fff9f; }
    .status-error    { background: #3a1a1a; color: #ff7f7f; }

    /* 進捗バー */
    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin-top: 1rem;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ログ */
    .log-box {
      background: var(--surface2);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.78rem;
      font-family: monospace;
      max-height: 200px;
      overflow-y: auto;
      color: var(--text-sub);
      margin-top: 1rem;
    }
    .log-ok  { color: #7fff9f; }
    .log-err { color: #ff7f7f; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🎵</span>
      <span class="logo-text">Vinyl Share — 管理画面</span>
    </div>
  </div>
</header>

<div class="admin-container">

  <!-- 認証設定 -->
  <div class="admin-card">
    <h2>🔑 管理者設定</h2>
    <div class="form-row">
      <label>API URL（Worker URL）</label>
      <input type="text" id="api-url" placeholder="https://vinyl-share-api.yourname.workers.dev">
    </div>
    <div class="form-row">
      <label>管理者パスワード（ADMIN_SECRET）</label>
      <input type="password" id="admin-secret" placeholder="wrangler secret で設定したパスワード">
    </div>
    <button class="btn" onclick="saveConfig()">保存</button>
    <button class="btn btn-secondary" onclick="testConnection()">接続テスト</button>
    <span id="conn-status" style="font-size:0.85rem; margin-left:0.5rem;"></span>
  </div>

  <!-- 一括アップロード -->
  <div class="admin-card">
    <h2>📤 画像一括アップロード</h2>
    <p style="font-size:0.85rem; color:var(--text-sub); margin-bottom:1rem;">
      表・裏のJPG/PNG画像を選択してください。ファイル名に「_front」「_back」が含まれると自動判別します。<br>
      同じレコードIDを指定すると、表裏を同一レコードとして登録できます。
    </p>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/heic,image/webp">
      <div>📁 ここをクリック、またはファイルをドロップ</div>
      <div style="font-size:0.8rem; margin-top:0.5rem;">JPG / PNG / HEIC / WEBP 対応</div>
    </div>

    <div id="upload-queue" class="upload-queue"></div>

    <div style="margin-top:1rem; display:none" id="upload-controls">
      <button class="btn" onclick="startUpload()">▶ アップロード開始</button>
      <button class="btn btn-secondary" onclick="clearQueue()">クリア</button>
      <span id="queue-count" style="font-size:0.85rem; margin-left:0.75rem;"></span>
    </div>

    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="log-box" id="log-box" style="display:none"></div>
  </div>

</div>

<script>
// ─── 設定保存 ─────────────────────────────────────
let config = {
  apiUrl: localStorage.getItem('vinyl_api_url') || '',
  secret: localStorage.getItem('vinyl_secret') || ''
};

document.getElementById('api-url').value = config.apiUrl;

function saveConfig() {
  config.apiUrl = document.getElementById('api-url').value.replace(/\/$/, '');
  config.secret = document.getElementById('admin-secret').value;
  localStorage.setItem('vinyl_api_url', config.apiUrl);
  document.getElementById('conn-status').textContent = '✓ 保存しました';
  setTimeout(() => document.getElementById('conn-status').textContent = '', 2000);
}

async function testConnection() {
  saveConfig();
  const el = document.getElementById('conn-status');
  el.textContent = '接続中...';
  try {
    const res = await fetch(`${config.apiUrl}/api/records`);
    if (res.ok) {
      const data = await res.json();
      el.textContent = `✓ 接続OK（レコード ${data.records?.length ?? 0} 件）`;
      el.style.color = '#7fff9f';
    } else {
      el.textContent = `✗ エラー: HTTP ${res.status}`;
      el.style.color = '#ff7f7f';
    }
  } catch (e) {
    el.textContent = `✗ 接続失敗: ${e.message}`;
    el.style.color = '#ff7f7f';
  }
}

// ─── ファイル選択 ─────────────────────────────────
let queue = [];

document.getElementById('file-input').addEventListener('change', (e) => {
  addFiles([...e.target.files]);
  e.target.value = '';
});

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files]);
});

function addFiles(files) {
  files.forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const name = file.name.toLowerCase();
    const side = name.includes('_back') || name.includes('裏') ? 'back' : 'front';
    // ファイル名からレコードIDのベースを推測
    const baseName = file.name.replace(/\.(jpg|jpeg|png|heic|webp)$/i, '')
                              .replace(/_front|_back|_表|_裏/gi, '');
    const recordId = sanitizeId(baseName);

    queue.push({
      file,
      recordId,
      side,
      artist: '',
      album: '',
      status: 'pending'
    });
  });
  renderQueue();
}

function sanitizeId(str) {
  return str.toLowerCase().replace(/[^a-z0-9-_]/g, '-').replace(/-+/g, '-').slice(0, 40);
}

// ─── キューレンダリング ────────────────────────────
function renderQueue() {
  const el = document.getElementById('upload-queue');
  if (queue.length === 0) {
    el.innerHTML = '';
    document.getElementById('upload-controls').style.display = 'none';
    return;
  }
  document.getElementById('upload-controls').style.display = 'block';
  document.getElementById('queue-count').textContent = `${queue.length} ファイル`;

  el.innerHTML = queue.map((item, i) => `
    <div class="queue-item" id="qitem-${i}">
      <img class="queue-thumb" src="${URL.createObjectURL(item.file)}" alt="">
      <div class="queue-info">
        <div class="queue-name">${escHtml(item.file.name)}</div>
        <div class="queue-fields">
          <input type="text" placeholder="レコードID（同じ値＝同一レコード）"
            value="${escHtml(item.recordId)}"
            onchange="queue[${i}].recordId = sanitizeId(this.value)">
          <select class="side-select" onchange="queue[${i}].side = this.value">
            <option value="front" ${item.side === 'front' ? 'selected' : ''}>表</option>
            <option value="back"  ${item.side === 'back'  ? 'selected' : ''}>裏</option>
          </select>
        </div>
        <div class="queue-fields" style="margin-top:0.25rem">
          <input type="text" placeholder="アーティスト名"
            onchange="queue[${i}].artist = this.value">
          <input type="text" placeholder="アルバム名"
            onchange="queue[${i}].album = this.value">
        </div>
      </div>
      <span class="status-badge status-${item.status}" id="badge-${i}">待機</span>
    </div>
  `).join('');
}

function clearQueue() {
  queue = [];
  renderQueue();
  document.getElementById('log-box').style.display = 'none';
  document.getElementById('progress-bar').style.display = 'none';
}

// ─── アップロード実行 ──────────────────────────────
async function startUpload() {
  saveConfig();
  if (!config.apiUrl) { alert('API URLを入力してください'); return; }
  if (!config.secret) { alert('管理者パスワードを入力してください'); return; }

  const logBox = document.getElementById('log-box');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  logBox.style.display = 'block';
  progressBar.style.display = 'block';
  logBox.innerHTML = '';

  let done = 0;
  for (let i = 0; i < queue.length; i++) {
    const item = queue[i];
    if (item.status === 'done') { done++; continue; }

    // バッジ更新
    updateBadge(i, 'uploading', '送信中');

    const formData = new FormData();
    formData.append('image', item.file);
    formData.append('recordId', item.recordId);
    formData.append('side', item.side);
    formData.append('artist', item.artist);
    formData.append('album', item.album);

    try {
      const res = await fetch(`${config.apiUrl}/api/upload`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${config.secret}` },
        body: formData
      });
      const data = await res.json();
      if (res.ok && data.success) {
        item.status = 'done';
        updateBadge(i, 'done', '完了');
        addLog(`✓ ${item.file.name} → /images/records/${item.recordId}/${item.side}.jpg`, 'ok');
      } else {
        item.status = 'error';
        updateBadge(i, 'error', 'エラー');
        addLog(`✗ ${item.file.name}: ${data.error || res.status}`, 'err');
      }
    } catch (e) {
      item.status = 'error';
      updateBadge(i, 'error', 'エラー');
      addLog(`✗ ${item.file.name}: ${e.message}`, 'err');
    }

    done++;
    progressFill.style.width = `${Math.round(done / queue.length * 100)}%`;
  }

  addLog(`--- 完了: ${queue.filter(q=>q.status==='done').length}/${queue.length} 件 ---`, 'ok');
}

function updateBadge(i, cls, text) {
  const el = document.getElementById(`badge-${i}`);
  if (el) {
    el.className = `status-badge status-${cls}`;
    el.textContent = text;
  }
}
function addLog(msg, type) {
  const el = document.getElementById('log-box');
  el.innerHTML += `<div class="log-${type}">${escHtml(msg)}</div>`;
  el.scrollTop = el.scrollHeight;
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
